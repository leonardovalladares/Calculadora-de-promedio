<!DOCTYPE html>
<html lang="en">
<head>
    <!--Boostrap CSS-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de promedio de notas</title>
</head>
<body class="bg-light">
    <main class="container py-5">
        <section class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-warning text-white">
                        <h1>Calculador de Promedios</h1>
                    </div>
                    <div-card class="card-body">
                        <div class="mb-3">
                            <label for="txtNombre" class="form-label">Nombre del estudiante</label>
                            <input type="text" name="" id="txtNombre" class="form-control" placeholder="Juancito...">
                        </div>
                        <div class="mb-3">
                            <label for="txtNota1" class="form-label">Nota 1</label>
                            <input type="number" name="" id="txtNota1" class="form-control" placeholder="0.0" min="0" max="10" step="0.01" >
                        </div>
                        <div class="mb-3">
                            <label for="txtNota2" class="form-label">Nota 2</label>
                            <input type="number" name="" id="txtNota2" class="form-control" placeholder="0.0" min="0" max="10" step="0.01" >
                        </div>

                        <div class="mb-3">
                            <label for="txtNota3" class="form-label">Nota 3</label>
                            <input type="number" name="" id="txtNota3" class="form-control" placeholder="0.0" min="0" max="10" step="0.01" >
                        </div>

                        <button class="btn btn-success" id="btnCalcular">Calcular Promedio</button>
                        <div class="mt-4" id="resultado">
                            <div class="card border-succes">
                                <div class="card-header bg-succes text-white">
                                   Resultado
                                </div>

                                <div class="card-body">
                                    <p>El estudiante Edgar tiene un promedio de 8.1 por lo tanto
                                        se encuentra en estado de aprobado.
                                    </p>
                                </div>
                            </div>
                        </div>

                        
                    </div-card>
                    
                </div>
            </div>
        </section>
    </main>
        <!--Boostrap JavaScript-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    
    <script src="../PROMEDIO/js/script.js"> </script>
</body>
</html>
